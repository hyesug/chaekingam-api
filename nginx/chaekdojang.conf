# /etc/nginx/sites-available/chaekdojang
#
# 사용법:
#   1. YOUR_DOMAIN을 실제 도메인으로 교체
#   2. sudo cp chaekdojang.conf /etc/nginx/sites-available/chaekdojang
#   3. sudo ln -s /etc/nginx/sites-available/chaekdojang /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d YOUR_DOMAIN   ← SSL 자동 적용
#
# certbot 실행 후 이 파일에 SSL 설정이 자동으로 추가됩니다.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Spring Boot multipart 설정(5MB)보다 여유 있게 설정
    client_max_body_size 10M;

    # 보안 헤더
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header Referrer-Policy        "same-origin"     always;

    # Spring Boot 앱으로 프록시
    location / {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;

        # 실제 클라이언트 IP를 Spring Boot에 전달
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
