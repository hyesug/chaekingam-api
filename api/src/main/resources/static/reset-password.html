<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>책인감 — 비밀번호 재설정</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #111; }
    p.desc { font-size: 14px; color: #666; margin-bottom: 24px; }
    label { font-size: 13px; color: #444; display: block; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    input[type="password"]:focus { border-color: #4f46e5; }
    button {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
    .msg {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .msg.success { color: #16a34a; }
    .msg.error   { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h1>비밀번호 재설정</h1>
    <p class="desc">새로운 비밀번호를 입력해 주세요. (8자 이상)</p>

    <label for="pw">새 비밀번호</label>
    <input type="password" id="pw" placeholder="새 비밀번호 입력">

    <label for="pw2">비밀번호 확인</label>
    <input type="password" id="pw2" placeholder="비밀번호 재입력">

    <button onclick="submit()">변경하기</button>

    <p class="msg" id="msg"></p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');

    async function submit() {
      const pw  = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      const msg = document.getElementById('msg');

      msg.style.display = 'none';

      if (!token) {
        showMsg('유효하지 않은 링크입니다.', false);
        return;
      }
      if (pw.length < 8) {
        showMsg('비밀번호는 8자 이상이어야 합니다.', false);
        return;
      }
      if (pw !== pw2) {
        showMsg('비밀번호가 일치하지 않습니다.', false);
        return;
      }

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: pw })
        });
        const data = await res.json();
        if (res.ok) {
          showMsg('비밀번호가 변경되었습니다. 앱에서 로그인해 주세요.', true);
        } else {
          showMsg(data.message || '오류가 발생했습니다.', false);
        }
      } catch {
        showMsg('서버 연결에 실패했습니다.', false);
      }
    }

    function showMsg(text, ok) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = 'msg ' + (ok ? 'success' : 'error');
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
