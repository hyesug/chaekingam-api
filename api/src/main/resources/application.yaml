spring:
  application:
    name: api
  config:
    import: optional:application-local.yaml
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            redirect-uri: "${FRONTEND_URL:http://localhost:3000}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname, profile_image
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            redirect-uri: "${FRONTEND_URL:http://localhost:3000}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: name, email, profile_image
            client-name: Naver
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            redirect-uri: "${FRONTEND_URL:http://localhost:3000}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope: profile, email
            client-name: Google
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      platform: postgresql
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

jwt:
  secret: ${JWT_SECRET:chaekingam-dev-secret-key-must-be-32chars-ok!}
  expiration-ms: 86400000

server:
  forward-headers-strategy: native  # Nginx의 X-Forwarded-Proto 신뢰 → OAuth redirect URI가 https://로 생성됨
  servlet:
    encoding:
      charset: UTF-8
      force: true

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  backend-url: ${BACKEND_URL:http://localhost:8080}

kakao:
  api-key: ${KAKAO_API_KEY:}

deepl:
  api-key: ${DEEPL_API_KEY:}

toss:
  secret-key: ${TOSS_SECRET_KEY:}

google:
  api-key: ${GOOGLE_API_KEY:}
