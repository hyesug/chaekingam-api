spring:
  application:
    name: api
  config:
    import: optional:application-local.yaml
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      platform: postgresql
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:chaekingam-dev-secret-key-must-be-32chars-ok!}
  expiration-ms: 86400000

server:
  servlet:
    encoding:
      charset: UTF-8
      force: true

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  backend-url: ${BACKEND_URL:http://localhost:8080}

